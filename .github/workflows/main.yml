name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  # Deploy to Netlify using GitHub-hosted runner
  deploy-netlify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Build Docusaurus site
        run: npm run build

      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --prod --dir=build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  # Deploy using self-hosted runner with Docker Compose
  deploy-self-hosted:
    runs-on: self-hosted

    steps:
      # Fix Docusaurus cache permission issue before checkout
      # Docker builds create files as root, so use a Docker container to clean them
      - name: Clean workspace
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" alpine sh -c "rm -rf /workspace/.docusaurus" || true

      - uses: actions/checkout@v4

      - name: Build and Deploy with Docker Compose
        run: |
          docker compose down
          docker compose build --no-cache
          docker compose up -d

      - name: Clean up old images
        run: docker image prune -f
